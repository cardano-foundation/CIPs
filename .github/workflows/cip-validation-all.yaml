name: CIP Validation (full repo)

# Audits every merged CIP-NNNN/README.md against the current validation rules.
# Intended to be dispatched from the master branch.

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Get CIP files to validate
        id: get-files
        run: |
          FILES=$(find . -maxdepth 2 -type f -name 'README.md' | sed 's|^\./||' | grep -iE '^CIP-[^/]+/README\.md$' | sort || true)

          if [ -z "$FILES" ]; then
            echo "No CIP README.md files found"
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          FILES_SPACE=$(echo "$FILES" | tr '\n' ' ')
          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "files=$FILES_SPACE" >> $GITHUB_OUTPUT

      - name: Validate CIP files
        if: steps.get-files.outputs.has_files == 'true'
        run: |
          FILES="${{ steps.get-files.outputs.files }}"
          echo "Validating CIP files: $FILES"
          python3 .github/scripts/validate-cip.py $FILES
